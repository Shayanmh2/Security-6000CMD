{% extends "base.html" %}

{% block title %}Edit Product - Amazing Bargain Central{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Product</h2>
    <form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        
        {% if product.image_url %}
        <div style="margin-bottom: 1rem; text-align: center;">
            <label>Current Image:</label>
            <div style="margin-top: 0.5rem;">
                <img src="{{ url_for('static', filename='uploads/' + product.image_url) }}" alt="Current product image" class="product-image" style="display: inline-block;">
            </div>
        </div>
        {% endif %}
        
        <div class="form-group">
            <label for="name">Product Name:</label>
            <input type="text" id="name" name="name" value="{{ product.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea id="description" name="description" rows="5" required>{{ product.description }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="price">Price (£):</label>
            <input type="number" id="price" name="price" step="0.01" min="0.01" value="{{ product.price }}" required>
        </div>
        
        <div class="form-group">
            <label for="image">{% if product.image_url %}Change Image (optional):{% else %}Add Image (optional):{% endif %}</label>
            <input type="file" id="image" name="image" accept="image/png, image/jpeg, image/jpg, image/gif">
            <small style="color: #666; display: block; margin-top: 0.5rem;">Accepted formats: PNG, JPG, JPEG, GIF (Max 5MB)</small>
        </div>
        
        <button type="submit">Update Product</button>
        <a href="{{ url_for('seller_dashboard') }}" class="btn" style="background: #6c757d; margin-left: 0.5rem;">Cancel</a>
    </form>
</div>
{% endblock %}
